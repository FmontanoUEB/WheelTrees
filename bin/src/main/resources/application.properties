# ── Aplicación ──────────────────────────────────────────────────
spring.application.name=wheeltrees

# ── Base de datos H2 (desarrollo local) ─────────────────────────
spring.datasource.url=jdbc:h2:mem:wheeltreesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3Igd2hlZWx0cmVlcyBhcHAgMjAyNg==
jwt.expiration-ms=86400000

# ── Swagger / OpenAPI ────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method

# ── Servidor ─────────────────────────────────────────────────────
server.port=8080

# ── Quita el warning de open-in-view ────────────────────────────
spring.jpa.open-in-view=false